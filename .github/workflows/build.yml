name: Build KidDraw

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2 via vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "44819aa2a6c10e56065e2b0330e7d6c89d1d2574"

      - name: Install SDL2 package
        run: vcpkg install sdl2:x64-windows

      - name: Configure CMake
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: kid-draw-windows
          path: build/Release/kid_draw.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: brew install sdl2

      - name: Configure CMake
        run: cmake -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Upload macOS executable
        uses: actions/upload-artifact@v4
        with:
          name: kid-draw-macos
          path: build/kid_draw
